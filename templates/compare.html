<!DOCTYPE html>
<html>
<head>
    <title>Compare Properties</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 12px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .result-card {
            margin-top: 40px;
        }

        .vs-box {
            font-size: 28px;
            font-weight: bold;
            color: #6c757d;
        }

        .winner-box {
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h2 class="text-center mb-4">🏠 Property Comparison Tool</h2>

        <div class="row">

            <!-- PROPERTY A -->
            <div class="col-md-6">

                <h4 class="text-primary mb-3">Property A</h4>

                <label>Bedrooms</label>
                <input type="number" id="a_bed" class="form-control mb-2">

                <label>Bathrooms</label>
                <input type="number" step="0.1" id="a_bath" class="form-control mb-2">

                <label>Sqft Living</label>
                <input type="number" id="a_sqft" class="form-control mb-2">

                <label>Grade (1-13)</label>
<input type="number" id="a_grade" class="form-control mb-2">

<label>Condition (1-5)</label>
<input type="number" id="a_condition" class="form-control mb-2">

<label>Year Built</label>
<input type="number" id="a_year" class="form-control mb-2">

<label>Year Sold</label>
<input type="number" id="a_sold" class="form-control mb-2">

<label>Latitude</label>
<input type="text" id="a_lat" class="form-control mb-2">

<label>Longitude</label>
<input type="text" id="a_long" class="form-control mb-2">

                <label>Annual Rent (₹)</label>
                <input type="number" id="a_rent" class="form-control mb-2">

                <label>Annual Expenses (₹)</label>
                <input type="number" id="a_exp" class="form-control mb-2">

                <label>Annual Loan Payment (₹)</label>
                <input type="number" id="a_loan" class="form-control mb-2">

                <label>Investment Years</label>
                <input type="number" id="a_years" class="form-control mb-2">

            </div>

            <!-- PROPERTY B -->
            <div class="col-md-6">

                <h4 class="text-success mb-3">Property B</h4>

                <label>Bedrooms</label>
                <input type="number" id="b_bed" class="form-control mb-2">

                <label>Bathrooms</label>
                <input type="number" step="0.1" id="b_bath" class="form-control mb-2">

                <label>Sqft Living</label>
                <input type="number" id="b_sqft" class="form-control mb-2">

                <label>Grade (1-13)</label>
<input type="number" id="b_grade" class="form-control mb-2">

<label>Condition (1-5)</label>
<input type="number" id="b_condition" class="form-control mb-2">

<label>Year Built</label>
<input type="number" id="b_year" class="form-control mb-2">

<label>Year Sold</label>
<input type="number" id="b_sold" class="form-control mb-2">

<label>Latitude</label>
<input type="text" id="b_lat" class="form-control mb-2">

<label>Longitude</label>
<input type="text" id="b_long" class="form-control mb-2">


                <label>Annual Rent (₹)</label>
                <input type="number" id="b_rent" class="form-control mb-2">

                <label>Annual Expenses (₹)</label>
                <input type="number" id="b_exp" class="form-control mb-2">

                <label>Annual Loan Payment (₹)</label>
                <input type="number" id="b_loan" class="form-control mb-2">

                <label>Investment Years</label>
                <input type="number" id="b_years" class="form-control mb-2">

            </div>

        </div>

        <div class="text-center mt-4">
            <button onclick="compare()" class="btn btn-dark btn-lg">
                Compare Now
            </button>
        </div>

    </div>

    <!-- RESULT SECTION -->
    <div id="result" class="result-card"></div>

</div>


<script>

async function compare() {

    const data = {
    property1: {
        bedrooms: +document.getElementById("a_bed").value,
        bathrooms: +document.getElementById("a_bath").value,
        sqft_living: +document.getElementById("a_sqft").value,
        grade: +document.getElementById("a_grade").value,
        condition: +document.getElementById("a_condition").value,
        yr_built: +document.getElementById("a_year").value,
        year_sold: +document.getElementById("a_sold").value,
        lat: +document.getElementById("a_lat").value,
        long: +document.getElementById("a_long").value,
        rent: +document.getElementById("a_rent").value,
        expenses: +document.getElementById("a_exp").value,
        loan: +document.getElementById("a_loan").value,
        years: +document.getElementById("a_years").value
    },

    property2: {
        bedrooms: +document.getElementById("b_bed").value,
        bathrooms: +document.getElementById("b_bath").value,
        sqft_living: +document.getElementById("b_sqft").value,
        grade: +document.getElementById("b_grade").value,
        condition: +document.getElementById("b_condition").value,
        yr_built: +document.getElementById("b_year").value,
        year_sold: +document.getElementById("b_sold").value,
        lat: +document.getElementById("b_lat").value,
        long: +document.getElementById("b_long").value,
        rent: +document.getElementById("b_rent").value,
        expenses: +document.getElementById("b_exp").value,
        loan: +document.getElementById("b_loan").value,
        years: +document.getElementById("b_years").value
    }
};

    const res = await fetch("/api/compare", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await res.json();

    document.getElementById("result").innerHTML = `

    <div class="card p-4">

        <h4 class="text-center mb-4">📊 Comparison Result</h4>

        <div class="row text-center">

            <div class="col-md-5">
                <div class="card p-3 border-primary">
                    <h5 class="text-primary">Property A</h5>

                    <p><b>Price</b></p>
                    <h6>₹ ${result.property1.price}</h6>

                    <p class="mt-2"><b>ROI</b></p>
                    <h5 class="${result.property1.roi > result.property2.roi ? 'text-success' : 'text-danger'}">
                        ${result.property1.roi}%
                    </h5>

                    <p class="mt-2"><b>IRR</b></p>
                    <h6>${result.property1.irr}%</h6>
                </div>
            </div>

            <div class="col-md-2 d-flex align-items-center justify-content-center">
                <div class="vs-box">VS</div>
            </div>

            <div class="col-md-5">
                <div class="card p-3 border-success">
                    <h5 class="text-success">Property B</h5>

                    <p><b>Price</b></p>
                    <h6>₹ ${result.property2.price}</h6>

                    <p class="mt-2"><b>ROI</b></p>
                    <h5 class="${result.property2.roi > result.property1.roi ? 'text-success' : 'text-danger'}">
                        ${result.property2.roi}%
                    </h5>

                    <p class="mt-2"><b>IRR</b></p>
                    <h6>${result.property2.irr}%</h6>
                </div>
            </div>

        </div>

        <div class="text-center mt-4">
            <div class="alert alert-success winner-box">
                🏆 Best Investment: 
                ${result.property1.roi > result.property2.roi ? "Property A" : "Property B"}
            </div>
        </div>

    </div>
    `;

    document.getElementById("result").scrollIntoView({
    behavior: "smooth"
});
}

</script>

</body>
</html>
